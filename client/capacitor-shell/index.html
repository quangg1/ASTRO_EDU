<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosmo Learn</title>
    <style>
      body {
        margin: 0;
        background: #000;
        color: #fff;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
      }
      main {
        max-width: 520px;
        text-align: center;
        padding: 24px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.04);
      }
      a {
        color: #22d3ee;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Cosmo Learn Hybrid Shell</h1>
      <p>
        Native platform wrapper is configured. Point this shell to your deployed
        web app or local tunnel in Capacitor server settings for runtime usage.
      </p>
      <p><a href="https://example.com">Open configured web endpoint</a></p>
    </main>
  </body>
</html>
